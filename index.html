<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ローカルのマークダウンファイルを快適に編集できる専用エディター" />
  <title>MarkDown Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
</head>

<body>
  <!-- ヘッダー -->
  <header id="app-header">
    <div class="header-left">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 3v4a1 1 0 0 0 1 1h4" />
          <path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z" />
          <path d="M9 15l2 2 4-4" />
        </svg>
        <span class="logo-text">MarkDown Studio</span>
      </div>
      <span id="file-name" class="file-name">無題のドキュメント</span>
      <span id="save-indicator" class="save-indicator saved" title="保存済み"></span>
    </div>
    <div class="header-right">
      <button id="btn-new" class="header-btn" title="新規作成 (Ctrl+N)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 3v4a1 1 0 0 0 1 1h4" />
          <path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z" />
          <line x1="12" y1="11" x2="12" y2="17" />
          <line x1="9" y1="14" x2="15" y2="14" />
        </svg>
        <span>新規</span>
      </button>
      <button id="btn-open" class="header-btn" title="ファイルを開く (Ctrl+O)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
        </svg>
        <span>開く</span>
      </button>
      <button id="btn-save" class="header-btn" title="上書き保存 (Ctrl+S)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
          <polyline points="17 21 17 13 7 13 7 21" />
          <polyline points="7 3 7 8 15 8" />
        </svg>
        <span>保存</span>
      </button>
      <button id="btn-save-as" class="header-btn" title="名前を付けて保存 (Ctrl+Shift+S)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
          <polyline points="17 21 17 13 7 13 7 21" />
          <polyline points="7 3 7 8 15 8" />
        </svg>
        <span>別名保存</span>
      </button>
      <div class="header-divider"></div>
      <button id="btn-theme" class="header-btn icon-only" title="テーマ切替">
        <svg id="icon-theme-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
        <svg id="icon-theme-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      </button>
    </div>
  </header>

  <!-- ツールバー -->
  <div id="toolbar">
    <div class="toolbar-group">
      <button class="toolbar-btn" data-action="heading1" title="見出し1 (Ctrl+1)">H1</button>
      <button class="toolbar-btn" data-action="heading2" title="見出し2 (Ctrl+2)">H2</button>
      <button class="toolbar-btn" data-action="heading3" title="見出し3 (Ctrl+3)">H3</button>
    </div>
    <div class="toolbar-divider"></div>
    <div class="toolbar-group">
      <button class="toolbar-btn" data-action="bold" title="太字 (Ctrl+B)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z" />
          <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z" />
        </svg>
      </button>
      <button class="toolbar-btn" data-action="italic" title="斜体 (Ctrl+I)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="4" x2="10" y2="4" />
          <line x1="14" y1="20" x2="5" y2="20" />
          <line x1="15" y1="4" x2="9" y2="20" />
        </svg>
      </button>
      <button class="toolbar-btn" data-action="strikethrough" title="取り消し線">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 4H9a3 3 0 0 0-3 3v0a3 3 0 0 0 3 3h6a3 3 0 0 1 3 3v0a3 3 0 0 1-3 3H8" />
          <line x1="4" y1="12" x2="20" y2="12" />
        </svg>
      </button>
    </div>
    <div class="toolbar-divider"></div>
    <div class="toolbar-group">
      <button class="toolbar-btn" data-action="ul" title="箇条書きリスト">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6" />
          <line x1="8" y1="12" x2="21" y2="12" />
          <line x1="8" y1="18" x2="21" y2="18" />
          <circle cx="4" cy="6" r="1" fill="currentColor" />
          <circle cx="4" cy="12" r="1" fill="currentColor" />
          <circle cx="4" cy="18" r="1" fill="currentColor" />
        </svg>
      </button>
      <button class="toolbar-btn" data-action="ol" title="番号付きリスト">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="10" y1="6" x2="21" y2="6" />
          <line x1="10" y1="12" x2="21" y2="12" />
          <line x1="10" y1="18" x2="21" y2="18" /><text x="2" y="8" font-size="8" fill="currentColor" stroke="none"
            font-family="Inter">1</text><text x="2" y="14" font-size="8" fill="currentColor" stroke="none"
            font-family="Inter">2</text><text x="2" y="20" font-size="8" fill="currentColor" stroke="none"
            font-family="Inter">3</text>
        </svg>
      </button>
      <button class="toolbar-btn" data-action="checklist" title="チェックリスト">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="6" height="6" rx="1" />
          <path d="M5 8l1.5 1.5L9 7" />
          <line x1="13" y1="8" x2="21" y2="8" />
          <rect x="3" y="14" width="6" height="6" rx="1" />
          <line x1="13" y1="17" x2="21" y2="17" />
        </svg>
      </button>
    </div>
    <div class="toolbar-divider"></div>
    <div class="toolbar-group">
      <button class="toolbar-btn" data-action="quote" title="引用">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V21z" />
          <path
            d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3z" />
        </svg>
      </button>
      <button class="toolbar-btn" data-action="code" title="インラインコード">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6" />
          <polyline points="8 6 2 12 8 18" />
        </svg>
      </button>
      <button class="toolbar-btn" data-action="codeblock" title="コードブロック">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <polyline points="10 8 6 12 10 16" />
          <polyline points="14 16 18 12 14 8" />
        </svg>
      </button>
    </div>
    <div class="toolbar-divider"></div>
    <div class="toolbar-group">
      <button class="toolbar-btn" data-action="link" title="リンク (Ctrl+K)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
        </svg>
      </button>
      <button class="toolbar-btn" data-action="image" title="画像">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
          <circle cx="8.5" cy="8.5" r="1.5" />
          <polyline points="21 15 16 10 5 21" />
        </svg>
      </button>
      <button class="toolbar-btn" data-action="table" title="テーブル">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <line x1="3" y1="9" x2="21" y2="9" />
          <line x1="3" y1="15" x2="21" y2="15" />
          <line x1="9" y1="3" x2="9" y2="21" />
          <line x1="15" y1="3" x2="15" y2="21" />
        </svg>
      </button>
      <button class="toolbar-btn" data-action="hr" title="水平線">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round">
          <line x1="2" y1="12" x2="22" y2="12" />
        </svg>
      </button>
    </div>
    <div class="toolbar-spacer"></div>
    <div class="toolbar-group">
      <button id="btn-outline-toggle" class="toolbar-btn" data-action="toggleOutline" title="アウトライン表示">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="10" y2="6" />
          <line x1="3" y1="12" x2="14" y2="12" />
          <line x1="3" y1="18" x2="11" y2="18" />
          <polyline points="17 9 20 12 17 15" />
        </svg>
      </button>
      <button id="btn-view-toggle" class="toolbar-btn" title="表示切替">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <line x1="12" y1="3" x2="12" y2="21" />
        </svg>
      </button>
    </div>
  </div>

  <!-- メインコンテンツ -->
  <main id="main-content">
    <!-- アウトラインパネル -->
    <aside id="outline-panel" class="outline-panel hidden">
      <div class="outline-header">
        <span>アウトライン</span>
        <button id="btn-outline-close" class="outline-close-btn" title="閉じる">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <ul id="outline-list" class="outline-list"></ul>
    </aside>

    <!-- エディターパネル -->
    <div id="editor-panel" class="editor-panel">
      <div id="editor-container"></div>
    </div>

    <!-- リサイズハンドル -->
    <div id="resize-handle" class="resize-handle">
      <div class="resize-handle-line"></div>
    </div>

    <!-- プレビューパネル -->
    <div id="preview-panel" class="preview-panel">
      <div id="preview-content" class="preview-content markdown-body"></div>
    </div>
  </main>

  <!-- ステータスバー -->
  <footer id="status-bar">
    <div class="status-left">
      <span id="status-lines" class="status-item">行: 0</span>
      <span class="status-divider">|</span>
      <span id="status-chars" class="status-item">文字: 0</span>
      <span class="status-divider">|</span>
      <span id="status-cursor" class="status-item">行 1, 列 1</span>
    </div>
    <div class="status-right">
      <span id="status-encoding" class="status-item">UTF-8</span>
      <span class="status-divider">|</span>
      <span id="status-format" class="status-item">Markdown</span>
    </div>
  </footer>

  <!-- ドラッグ&ドロップオーバーレイ -->
  <div id="drop-overlay" class="drop-overlay hidden">
    <div class="drop-overlay-content">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 3v4a1 1 0 0 0 1 1h4" />
        <path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z" />
      </svg>
      <p>マークダウンファイルをここにドロップ</p>
    </div>
  </div>

  <!-- 通知トースト -->
  <div id="toast-container" class="toast-container"></div>

  <!-- 確認ダイアログ -->
  <div id="confirm-overlay" class="confirm-overlay hidden">
    <div class="confirm-dialog">
      <h3 class="confirm-title">未保存の変更があります</h3>
      <p class="confirm-message">編集内容を保存せずに破棄してよろしいですか？</p>
      <div class="confirm-actions">
        <button id="btn-confirm-cancel" class="confirm-btn cancel">キャンセル</button>
        <button id="btn-confirm-ok" class="confirm-btn danger">破棄する</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
